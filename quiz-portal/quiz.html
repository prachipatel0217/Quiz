<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>QuizPro – Quiz</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="quiz-page">

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loader-logo">⚡ Loading Quiz…</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <span class="navbar-brand">⚡ QuizPro</span>
    <div class="navbar-actions">
      <button class="icon-btn" id="theme-toggle" title="Toggle dark mode">🌙</button>
      <button class="btn btn-ghost" id="quit-btn" style="font-size:.8rem;padding:.4rem .9rem;">✕ Quit</button>
    </div>
  </nav>

  <!-- Quiz header (category + timer) -->
  <div class="quiz-header page-enter">
    <div>
      <div class="quiz-category-label">Now playing</div>
      <div class="quiz-category-name" id="cat-name">Loading…</div>
    </div>

    <!-- Timer -->
    <div class="timer-wrap">
      <div class="timer-svg-container">
        <svg class="timer-svg" viewBox="0 0 90 90">
          <circle class="timer-track" cx="45" cy="45" r="36"/>
          <circle id="timer-circle" cx="45" cy="45" r="36"
            style="stroke-dasharray:226.2;stroke-dashoffset:0;"/>
        </svg>
        <div class="timer-text-wrap">
          <span id="timer-display">10:00</span>
          <span class="timer-label">left</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="quiz-progress-bar-wrap">
    <div class="quiz-progress-track">
      <div class="quiz-progress-fill" id="progress-bar" style="width:10%"></div>
    </div>
    <div class="quiz-counter" id="question-counter">Question 1 of 10</div>
  </div>

  <!-- Question dots -->
  <div style="max-width:860px;margin:.8rem auto;padding:0 1.5rem">
    <div class="question-dots" id="question-dots"></div>
  </div>

  <!-- Question card -->
  <div class="quiz-body">
    <div class="card question-card page-enter">
      <p id="question-text" style="opacity:1">Loading question…</p>
      <div id="options-container" style="opacity:1"></div>
    </div>

    <!-- Navigation -->
    <div class="quiz-nav">
      <button class="btn btn-ghost" id="btn-prev" onclick="Quiz.prev()">← Previous</button>
      <button class="btn btn-primary" id="btn-next"   onclick="Quiz.next()">Next →</button>
      <button class="btn btn-accent"  id="btn-submit" onclick="confirmSubmit()" style="display:none">Submit Quiz ✓</button>
    </div>
  </div>

  <!-- Confirm modal -->
  <div id="confirm-modal" style="
    display:none; position:fixed; inset:0; z-index:500;
    background:rgba(0,0,0,.35); backdrop-filter:blur(4px);
    align-items:center; justify-content:center; padding:1.5rem;">
    <div class="card" style="max-width:400px;width:100%;padding:2rem;text-align:center;animation:fadeInUp .3s ease">
      <div style="font-size:2.5rem;margin-bottom:.8rem">🤔</div>
      <h3 style="font-weight:700;margin-bottom:.5rem">Submit Quiz?</h3>
      <p style="font-size:.88rem;color:var(--text-light);margin-bottom:1.5rem" id="modal-msg">
        Are you sure you want to submit?
      </p>
      <div style="display:flex;gap:.8rem;justify-content:center">
        <button class="btn btn-ghost" onclick="document.getElementById('confirm-modal').style.display='none'">Cancel</button>
        <button class="btn btn-primary" onclick="Quiz.submitQuiz()">Submit →</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/quiz.js"></script>
  <script>
    setTimeout(() => document.getElementById("loading-screen").classList.add("hidden"), 1000);

    AUTH.requireAuth();

    // Apply saved theme
    const savedTheme = localStorage.getItem("quizTheme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);
    document.getElementById("theme-toggle").textContent = savedTheme === "dark" ? "☀️" : "🌙";

    // Set category name
    const catId = localStorage.getItem("quizCategory");
    const cat   = QUIZ_DATA.categories.find(c => c.id === catId);
    if (cat) document.getElementById("cat-name").textContent = cat.title;

    // Init quiz
    Quiz.init();

    // Theme toggle
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-theme");
      const nxt = cur === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", nxt);
      localStorage.setItem("quizTheme", nxt);
      document.getElementById("theme-toggle").textContent = nxt === "dark" ? "☀️" : "🌙";
    });

    // Quit with confirm
    document.getElementById("quit-btn").addEventListener("click", () => {
      if (confirm("Are you sure you want to quit? Your progress will be lost.")) {
        window.location.href = "dashboard.html";
      }
    });

    // Submit confirm modal
    function confirmSubmit() {
      const total    = parseInt(localStorage.getItem("quizTotal") || "10");
      const answered = Object.keys(Quiz._answers || {}).length;
      const modal = document.getElementById("confirm-modal");
      document.getElementById("modal-msg").textContent =
        `You've answered all questions. Ready to submit?`;
      modal.style.display = "flex";
    }
  </script>
</body>
</html>
